<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://unpkg.com/tailwindcss@1.9.6/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Library management system</title>
  </head>
  <body class="">
    <header class="header">
      <nav id="navbar">
        <!-- logo -->
        <div class="logo">
          <img
            src="logo.jpg"
            alt="Library Logo"
            class="logo"
          />
          <h1 class="logoTitle">Library</h1>
        </div>
        <!-- search -->
        <div class="searchBox">
          <input class="search" type="text" placeholder="Search books..." />
          <svg
            class="searchIcon"
            width="20"
            height="20"
            viewBox="0 0 20 20"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <circle
              cx="8"
              cy="8"
              r="6"
              stroke="currentColor"
              stroke-width="2"
            />
            <line
              x1="13"
              y1="13"
              x2="18"
              y2="18"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
        </div>
        <!-- userbtn -->
        <div class="userBtn">
          <div class="userBtn">
           

            <svg
              class="messageIcon"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <polyline
                points="22,6 12,13 2,6"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <svg
              class="notificationIcon"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M18 8C18 6.4087 17.3679 4.88258 16.2426 3.75736C15.1174 2.63214 13.5913 2 12 2C10.4087 2 8.88258 2.63214 7.75736 3.75736C6.63214 4.88258 6 6.4087 6 8C6 15 3 18 3 18H21C21 18 18 15 18 8Z"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M13.73 21C13.5542 21.3031 13.3019 21.5547 12.9982 21.7295C12.6946 21.9044 12.3504 21.9995 12 21.9995C11.6496 21.9995 11.3054 21.9044 11.0018 21.7295C10.6982 21.5547 10.4458 21.3031 10.27 21"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
          <!-- user button  -->

          <div class="profile">
            <div>
              <svg
                class="userIcon"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <circle
                  cx="12"
                  cy="8"
                  r="4"
                  stroke="currentColor"
                  stroke-width="2"
                />
                <path
                  d="M 4 20 Q 4 14 12 14 Q 20 14 20 20"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </div>
            <p class="">Manishimwe</p>
          </div>
        </div>
      </nav>
    </header>
    
    <main class="mainContent">
      <!-- sidebar -->
       <aside class="sidebar">
        <ul id="navLink">
          
        </ul>
       </aside>

      <!-- main content -->
       <section class="bookSection">
        <div class="flex items-center justify-between">
          <h2 class="font-semibold text-lg ">All Books</h2>
          <a href="/show/show-all.html" class="hover:text-blue-600 hover:underline">show all</a>
        </div>
        <div id="book-container">
          
        </div>
       </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
