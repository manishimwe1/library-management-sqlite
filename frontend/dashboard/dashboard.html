<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./dashbord.css" />
    <title>Dashboard page</title>
  </head>
  <body>
    <main class="main">
      <nav class="dash-nav">
        <div class="logo">
          <img src="../image/design.png" alt="logo" class="logo-img" />
          <!-- <h1 class="logoTitle">Library</h1> -->
        </div>
        <ul class="navlink">
          <li class="link"><a href="/frontend/index.html">Home</a></li>
          <li class="link"><a href="#" id="add-book-btn">Add books</a></li>
          <li class="link"><a href="#">Settings</a></li>
        </ul>
      </nav>
      <!-- <h1>Dashboard</h1> -->

      <div class="modal" id="modal">
        <div class="modal-content">
          <div class="modal-title">
            <h2 class="form-title">Add new book</h2>
            <button type="button" id="close-modal">x</button>
          </div>
          <form action="" class="book-form" id="submit-form">
            <div class="form-input">
              <label for="name">Name: </label>
              <input type="text" id="name" name="name" />
            </div>
            <div class="form-input">
              <label for="description">Description: </label>
              <textarea id="description" name="description" rows="4"></textarea>
            </div>
            <div class="form-input">
              <label for="author">Author: </label>
              <input type="text" id="author" name="author" />
            </div>
            <div class="form-input">
              <label for="price">Price: </label>
              <input type="number" id="price" name="price" step="0.01" />
            </div>
            <div class="form-input">
              <label for="image">image: </label>
              <input type="file" id="image" name="image" />
            </div>
            <div class="btn-wrapper">
                <button class="submit-btn" type="submit" id="add-book">Add book</button>
            </div>
          </form>
          
        </div>
      </div>

      <section class="content-section">
        <div class="table-header">
          <h2 class="table-title">Books Library</h2>
          <p class="table-subtitle">Manage your book collection</p>
        </div>

          <div class="table-container">
            <table class="books-table" id="book-table">
              <thead>
                <tr>
                  <th>Id</th>
                  <th>Name</th>
                  <th>Author</th>
                  <th>Description</th>
                  <th>Image</th>
                  <th>Price</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="table-body">
                
              </tbody>
            </table>
            <div class="empty-state" id="empty-state">
              <p>No books found yet</p>
              <p>click add book to add</p>
            </div>
          </div>

      </section>
    </main>

    <script src="dashboard.js"></script>
  </body>
</html>
